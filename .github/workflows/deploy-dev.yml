name: Deploy (dev)

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy dev stack
        run: npx cdk deploy PortfolioApiStack-dev --context stage=dev --require-approval never
