name: Deploy (dev)

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      # The admin email and site domain come from secrets, not variables: this
      # repo is public, so variable values would appear verbatim in these logs,
      # whereas secret values are masked.
      - name: Deploy dev stack
        run: >-
          npx cdk deploy PortfolioApiStack-dev --context stage=dev
          --context adminEmail="$ADMIN_EMAIL"
          --require-approval never
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}

      # Workout ingestion lives in us-west-2 and attaches to kotlin-ses-forward's
      # SES rule set. Only runs once WORKOUT_RULE_SET_NAME is set, so the pipeline
      # is safe to merge before that infra exists.
      - name: Deploy workout ingest stack
        if: ${{ secrets.WORKOUT_RULE_SET_NAME != '' }}
        run: >-
          npx cdk deploy WorkoutIngestStack-dev --context stage=dev
          --context adminEmail="$ADMIN_EMAIL"
          --context siteDomain="$SITE_DOMAIN"
          --context workoutRuleSetName="$WORKOUT_RULE_SET_NAME"
          --require-approval never
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          WORKOUT_RULE_SET_NAME: ${{ secrets.WORKOUT_RULE_SET_NAME }}
