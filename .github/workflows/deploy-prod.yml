name: Deploy (production)

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy production stack
        run: npx cdk deploy PortfolioApiStack-prod --context stage=prod --require-approval never

      # Workout ingestion lives in us-west-2 and attaches to kotlin-ses-forward's
      # SES rule set. Only runs once WORKOUT_RULE_SET_NAME is set as an Actions
      # variable, so the pipeline is safe to merge before that infra exists.
      - name: Deploy workout ingest stack
        if: ${{ vars.WORKOUT_RULE_SET_NAME != '' }}
        run: >-
          npx cdk deploy WorkoutIngestStack-prod --context stage=prod
          --context workoutRuleSetName=${{ vars.WORKOUT_RULE_SET_NAME }}
          --require-approval never
