name: Deploy (production)

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      # The admin email and public hostnames come from secrets, not variables:
      # this repo is public, so variable values would appear verbatim in these
      # logs, whereas secret values are masked.
      - name: Deploy production stack
        run: >-
          npx cdk deploy PortfolioApiStack-prod --context stage=prod
          --context adminEmail="$ADMIN_EMAIL"
          --context siteDomain="$SITE_DOMAIN"
          --context pagesOrigin="$PAGES_ORIGIN"
          --require-approval never
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          PAGES_ORIGIN: ${{ secrets.PAGES_ORIGIN }}

      # Workout ingestion lives in us-west-2 and attaches to kotlin-ses-forward's
      # SES rule set. Only runs once WORKOUT_RULE_SET_NAME is set, so the pipeline
      # is safe to merge before that infra exists.
      - name: Deploy workout ingest stack
        if: ${{ secrets.WORKOUT_RULE_SET_NAME != '' }}
        run: >-
          npx cdk deploy WorkoutIngestStack-prod --context stage=prod
          --context adminEmail="$ADMIN_EMAIL"
          --context siteDomain="$SITE_DOMAIN"
          --context workoutRuleSetName="$WORKOUT_RULE_SET_NAME"
          --require-approval never
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          WORKOUT_RULE_SET_NAME: ${{ secrets.WORKOUT_RULE_SET_NAME }}
