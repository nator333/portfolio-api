version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - aws-cdk
          - aws-cdk-lib
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - aws-cdk
          - aws-cdk-lib

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions:
        patterns:
          - "*"
